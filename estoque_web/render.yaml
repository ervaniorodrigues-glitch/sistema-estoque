services:
  # Web Service
  - type: web
    name: sistema-estoque
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: True
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: estoque-db
          property: connectionString
    
  # PostgreSQL Database
  - type: pgsql
    name: estoque-db
    region: oregon
    plan: free
    databaseName: estoque
    databaseUser: estoque_user
