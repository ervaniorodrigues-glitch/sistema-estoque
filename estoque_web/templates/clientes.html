{% extends "base.html" %}

{% block title %}Cadastro de Clientes{% endblock %}

{% block content %}
<div class="layout-with-list">
    <!-- Listbox Lateral -->
    <div class="sidebar-list">
        <div class="list-header">
            <input type="text" id="busca" class="list-search" placeholder="🔍 Busca Rápida...">
        </div>
        
        <div class="list-filters">
            <label style="margin-right: 10px;">
                <input type="radio" name="filtro" value="ativos" checked onchange="carregarClientes()"> Ativos
            </label>
            <label style="margin-right: 10px;">
                <input type="radio" name="filtro" value="inativos" onchange="carregarClientes()"> Inativos
            </label>
            <label>
                <input type="radio" name="filtro" value="todos" onchange="carregarClientes()"> Todos
            </label>
        </div>
        
        <div class="list-content" id="listaClientes"></div>
        
        <div class="list-footer">
            Total: <span id="totalClientes">0</span>
        </div>
    </div>
    
    <!-- Área do Formulário -->
    <div class="form-area">
        <div class="toolbar">
            <button class="toolbar-btn" id="btnNovo" onclick="novoCliente()">
                <i class="fas fa-file"></i> NOVO
            </button>
            <button class="toolbar-btn" id="btnLimpar" onclick="novoCliente()">
                <i class="fas fa-broom"></i> Limpar
            </button>
            <button class="toolbar-btn" onclick="exportarExcel()" style="background-color: #27ae60;">
                <i class="fas fa-file-excel"></i> Excel
            </button>
            <button class="toolbar-btn" onclick="abrirModalImportacao()" style="background-color: #3498db;">
                <i class="fas fa-file-upload"></i> Importar
            </button>
            <button class="toolbar-btn btn-success" id="btnSalvar" onclick="salvarCliente()" style="display:none;">
                <i class="fas fa-save"></i> Salvar
            </button>
            <button class="toolbar-btn btn-success" id="btnAlterar" onclick="salvarCliente()" style="display:none;">
                <i class="fas fa-edit"></i> Alterar
            </button>
            <button class="toolbar-btn btn-danger" id="btnExcluir" onclick="excluirCliente()" style="display:none;">
                <i class="fas fa-trash"></i> Excluir
            </button>
            <button class="toolbar-btn" id="btnInativar" onclick="inativarCliente()" style="display:none;">
                <i class="fas fa-ban"></i> Inativar
            </button>
        </div>
        
        <form id="formCliente">
            <input type="hidden" id="clienteId">
            
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" id="nome" required style="border: 2px solid #bdc3c7;">
                </div>
                <div class="form-group small">
                    <label class="form-label">ID</label>
                    <input type="text" class="form-control" id="codigo" readonly tabindex="-1" style="background-color: #ffe6e6;">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group medium">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" style="border: 2px solid #bdc3c7;">
                </div>
                <div class="form-group medium">
                    <label class="form-label">
                        <input type="radio" name="tipodoc" value="cpf" checked onchange="alterarTipoDocumento()"> CPF
                        <input type="radio" name="tipodoc" value="cnpj" onchange="alterarTipoDocumento()" style="margin-left: 15px;"> CNPJ
                    </label>
                    <input type="text" class="form-control" id="cpfcnpj" placeholder="000.000.000-00" style="border: 2px solid #bdc3c7;">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group medium">
                    <label class="form-label">Fone Comercial</label>
                    <input type="text" class="form-control" id="telefone" maxlength="15" style="border: 2px solid #bdc3c7;">
                </div>
                <div class="form-group medium">
                    <label class="form-label">Fone Celular</label>
                    <input type="text" class="form-control" id="celular" maxlength="16" style="border: 2px solid #bdc3c7;">
                </div>
                <div class="form-group medium">
                    <!-- Campo vazio para manter o layout -->
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">Endereço</label>
                    <input type="text" class="form-control" id="endereco" style="border: 2px solid #bdc3c7;">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group medium">
                    <label class="form-label">Cidade</label>
                    <input type="text" class="form-control" id="cidade" style="border: 2px solid #bdc3c7;">
                </div>
                <div class="form-group small">
                    <label class="form-label">UF</label>
                    <input type="text" class="form-control" id="uf" maxlength="2" style="border: 2px solid #bdc3c7;">
                </div>
                <div class="form-group medium">
                    <label class="form-label">CEP</label>
                    <input type="text" class="form-control" id="cep" maxlength="9" onblur="buscarCEP()" style="border: 2px solid #bdc3c7;">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">Anotações</label>
                    <textarea class="form-control" id="anotacoes" rows="3" style="border: 2px solid #bdc3c7;"></textarea>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
let clienteSelecionado = null;

document.addEventListener('DOMContentLoaded', function() {
    carregarClientes();
    document.getElementById('busca').addEventListener('input', carregarClientes);
    
    // Formatação de Telefone
    document.getElementById('telefone').addEventListener('input', formatarTelefone);
    document.getElementById('celular').addEventListener('input', formatarCelular);
    
    // Formatação de CPF/CNPJ
    document.getElementById('cpfcnpj').addEventListener('input', formatarCpfCnpj);
    
    // Formatação de CEP
    document.getElementById('cep').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 8) {
            value = value.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        }
    });
    
    // Monitorar digitação para mostrar botão Salvar
    document.getElementById('nome').addEventListener('input', controlarBotoes);
});

function formatarTelefone(e) {
    let value = e.target.value.replace(/\D/g, '');
    
    // Formatação Telefone Comercial: (XX) XXXX-XXXX ou (XX) XXXXX-XXXX
    if (value.length <= 10) {
        value = value.replace(/(\d{2})(\d)/, '($1) $2');
        value = value.replace(/(\d{4})(\d)/, '$1-$2');
    } else {
        value = value.replace(/(\d{2})(\d)/, '($1) $2');
        value = value.replace(/(\d{5})(\d)/, '$1-$2');
    }
    
    e.target.value = value;
}

function formatarCelular(e) {
    let value = e.target.value.replace(/\D/g, '');
    
    // Formatação Celular: (XX) X-XXXX-XXXX (16 dígitos com formatação)
    if (value.length <= 11) {
        value = value.replace(/(\d{2})(\d)/, '($1) $2');
        value = value.replace(/(\d{1})(\d{4})(\d)/, '$1-$2-$3');
    }
    
    e.target.value = value;
}

function alterarTipoDocumento() {
    const tipo = document.querySelector('input[name="tipodoc"]:checked').value;
    const campo = document.getElementById('cpfcnpj');
    
    // Limpar campo
    campo.value = '';
    
    // Alterar placeholder
    if (tipo === 'cpf') {
        campo.placeholder = '000.000.000-00';
        campo.maxLength = 14;
    } else {
        campo.placeholder = '00.000.000/0000-00';
        campo.maxLength = 18;
    }
}

function formatarCpfCnpj(e) {
    const tipo = document.querySelector('input[name="tipodoc"]:checked').value;
    let value = e.target.value.replace(/\D/g, '');
    
    if (tipo === 'cpf') {
        // Formatação CPF: 000.000.000-00
        if (value.length <= 11) {
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        }
    } else {
        // Formatação CNPJ: 00.000.000/0000-00
        if (value.length <= 14) {
            value = value.replace(/(\d{2})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1/$2');
            value = value.replace(/(\d{4})(\d{1,2})$/, '$1-$2');
        }
    }
    
    e.target.value = value;
}

function carregarClientes() {
    const busca = document.getElementById('busca').value;
    const filtro = document.querySelector('input[name="filtro"]:checked').value;
    
    fetch(`/api/clientes?busca=${busca}&ativo=${filtro}`)
        .then(r => r.json())
        .then(clientes => {
            const lista = document.getElementById('listaClientes');
            lista.innerHTML = clientes.map(c => `
                <div class="list-item" onclick="selecionarCliente(${c.id})" id="item-${c.id}">
                    <span class="status-badge ${c.ativo ? 'status-ativo' : 'status-inativo'}">
                        ${c.ativo ? '✓' : '✗'}
                    </span>
                    ${c.nome}
                </div>
            `).join('');
            
            document.getElementById('totalClientes').textContent = clientes.length;
        });
}

function selecionarCliente(id) {
    document.querySelectorAll('.list-item').forEach(item => item.classList.remove('selected'));
    document.getElementById(`item-${id}`).classList.add('selected');
    
    fetch(`/api/clientes?busca=&ativo=todos`)
        .then(r => r.json())
        .then(clientes => {
            const c = clientes.find(cli => cli.id === id);
            if (c) {
                clienteSelecionado = id;
                document.getElementById('clienteId').value = c.id;
                document.getElementById('codigo').value = c.id;
                document.getElementById('nome').value = c.nome;
                document.getElementById('email').value = c.email || '';
                
                // Detectar e configurar CPF/CNPJ
                const cpfcnpj = c.cpfcnpj || '';
                document.getElementById('cpfcnpj').value = cpfcnpj;
                if (cpfcnpj.length > 14) {
                    document.querySelector('input[name="tipodoc"][value="cnpj"]').checked = true;
                } else {
                    document.querySelector('input[name="tipodoc"][value="cpf"]').checked = true;
                }
                alterarTipoDocumento();
                document.getElementById('cpfcnpj').value = cpfcnpj;
                
                document.getElementById('telefone').value = c.telefone || '';
                document.getElementById('celular').value = c.celular || '';
                document.getElementById('endereco').value = c.endereco || '';
                document.getElementById('cidade').value = c.cidade || '';
                document.getElementById('uf').value = c.uf || '';
                document.getElementById('cep').value = c.cep || '';
                document.getElementById('anotacoes').value = c.anotacoes || '';
                
                controlarBotoes();
            }
        });
}

function novoCliente() {
    clienteSelecionado = null;
    document.getElementById('formCliente').reset();
    document.getElementById('clienteId').value = '';
    document.getElementById('codigo').value = '';
    
    // Remover seleção da lista
    document.querySelectorAll('.list-item').forEach(item => {
        item.classList.remove('selected');
    });
    
    controlarBotoes();
}

function controlarBotoes() {
    const temNome = document.getElementById('nome').value.trim() !== '';
    const filtro = document.querySelector('input[name="filtro"]:checked').value;
    
    // Ocultar todos
    document.getElementById('btnNovo').style.display = 'inline-flex';
    document.getElementById('btnLimpar').style.display = 'inline-flex';
    document.getElementById('btnSalvar').style.display = 'none';
    document.getElementById('btnAlterar').style.display = 'none';
    document.getElementById('btnExcluir').style.display = 'none';
    document.getElementById('btnInativar').style.display = 'none';
    
    if (filtro === 'ativos' && clienteSelecionado) {
        // Cliente ativo selecionado
        document.getElementById('btnAlterar').style.display = 'inline-flex';
        document.getElementById('btnExcluir').style.display = 'inline-flex';
        document.getElementById('btnInativar').innerHTML = '<i class="fas fa-ban"></i> Inativar';
        document.getElementById('btnInativar').style.display = 'inline-flex';
    } else if (filtro === 'inativos' && clienteSelecionado) {
        // Cliente inativo selecionado
        document.getElementById('btnAlterar').style.display = 'inline-flex';
        document.getElementById('btnExcluir').style.display = 'inline-flex';
        document.getElementById('btnInativar').innerHTML = '<i class="fas fa-check"></i> Ativar';
        document.getElementById('btnInativar').style.display = 'inline-flex';
    } else if (temNome && !clienteSelecionado) {
        // Novo cliente com dados digitados
        document.getElementById('btnSalvar').style.display = 'inline-flex';
    }
}

function inativarCliente() {
    if (!clienteSelecionado) return;
    
    // Buscar o cliente atual para saber se está ativo ou inativo
    fetch(`/api/clientes?busca=&ativo=todos`)
        .then(r => r.json())
        .then(clientes => {
            const c = clientes.find(cli => cli.id === clienteSelecionado);
            if (c) {
                const novoStatus = !c.ativo;
                const acao = novoStatus ? 'ativar' : 'inativar';
                
                if (confirm(`Deseja realmente ${acao} este cliente?`)) {
                    // Atualizar apenas o status
                    const data = {
                        nome: c.nome,
                        email: c.email,
                        cpfcnpj: c.cpfcnpj,
                        telefone: c.telefone,
                        celular: c.celular,
                        fax: c.fax,
                        endereco: c.endereco,
                        cidade: c.cidade,
                        uf: c.uf,
                        cep: c.cep,
                        anotacoes: c.anotacoes,
                        ativo: novoStatus
                    };
                    
                    fetch(`/api/clientes/${clienteSelecionado}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    })
                    .then(r => r.json())
                    .then(result => {
                        if (result.success) {
                            alert(`Cliente ${acao === 'ativar' ? 'ativado' : 'inativado'} com sucesso!`);
                            carregarClientes();
                            novoCliente();
                        }
                    });
                }
            }
        });
}

function salvarCliente() {
    const id = document.getElementById('clienteId').value;
    const cpfcnpj = document.getElementById('cpfcnpj').value.trim();
    
    // Validar CPF/CNPJ duplicado
    if (cpfcnpj) {
        fetch(`/api/clientes?busca=&ativo=todos`)
            .then(r => r.json())
            .then(clientes => {
                // Verificar se já existe outro cliente com o mesmo CPF/CNPJ
                const cpfcnpjExistente = clientes.find(c => c.cpfcnpj === cpfcnpj && c.id != id);
                if (cpfcnpjExistente) {
                    const tipo = cpfcnpj.length > 14 ? 'CNPJ' : 'CPF';
                    alert(`ERRO: Já existe um cliente cadastrado com o ${tipo} ${cpfcnpj}!\n\nCliente: ${cpfcnpjExistente.nome}\n\nNão é permitido ${tipo} duplicado!`);
                    return;
                }
                
                // Se não tem duplicado, salvar
                salvarClienteConfirmado(id);
            });
    } else {
        // Se não tem CPF/CNPJ, salvar direto
        salvarClienteConfirmado(id);
    }
}

function salvarClienteConfirmado(id) {
    const data = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        cpfcnpj: document.getElementById('cpfcnpj').value,
        telefone: document.getElementById('telefone').value,
        celular: document.getElementById('celular').value,
        endereco: document.getElementById('endereco').value,
        cidade: document.getElementById('cidade').value,
        uf: document.getElementById('uf').value,
        cep: document.getElementById('cep').value,
        anotacoes: document.getElementById('anotacoes').value,
        ativo: true
    };
    
    const url = id ? `/api/clientes/${id}` : '/api/clientes';
    const method = id ? 'PUT' : 'POST';
    
    fetch(url, {
        method: method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
        if (result.success) {
            alert('Cliente salvo com sucesso!');
            carregarClientes();
            novoCliente();
        }
    });
}

function buscarCEP() {
    const cep = document.getElementById('cep').value.replace(/\D/g, '');
    
    if (cep.length === 8) {
        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(r => r.json())
            .then(data => {
                if (!data.erro) {
                    document.getElementById('endereco').value = data.logradouro;
                    document.getElementById('cidade').value = data.localidade;
                    document.getElementById('uf').value = data.uf;
                } else {
                    alert('CEP não encontrado!');
                }
            })
            .catch(() => {
                alert('Erro ao buscar CEP!');
            });
    }
}

function excluirCliente() {
    if (!clienteSelecionado) return;
    
    if (confirm('Deseja realmente excluir este cliente?')) {
        fetch(`/api/clientes/${clienteSelecionado}`, {method: 'DELETE'})
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    alert('Cliente excluído!');
                    carregarClientes();
                    novoCliente();
                }
            });
    }
}

// Listener global para fechar modais com ESC
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        const modais = document.querySelectorAll('[id*="modal"]');
        modais.forEach(modal => {
            if (modal && modal.style.display !== 'none') {
                modal.remove();
            }
        });
    }
});

function exportarExcel() {
    const busca = document.getElementById('busca').value;
    const filtro = document.querySelector('input[name="filtro"]:checked').value;
    
    const params = new URLSearchParams();
    params.append('busca', busca);
    params.append('ativo', filtro);
    
    window.location.href = '/api/exportar-clientes-excel?' + params.toString();
}

function abrirModalImportacao() {
    const modal = document.createElement('div');
    modal.id = 'modalImportacao';
    modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
    `;
    
    modal.innerHTML = `
        <div style="background: white; padding: 30px; border-radius: 10px; max-width: 600px; width: 90%;">
            <h2 style="margin-top: 0; color: #2c3e50;">
                <i class="fas fa-file-upload"></i> Importar Clientes do Excel
            </h2>
            
            <p style="color: #7f8c8d; margin: 15px 0;">
                Selecione um arquivo Excel com os clientes a importar.
            </p>
            
            <div style="margin: 20px 0;">
                <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #2c3e50;">
                    Arquivo Excel:
                </label>
                <input type="file" id="arquivoExcel" accept=".xlsx,.xls" 
                       style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px;">
            </div>
            
            <div id="progressoImportacao" style="display: none; margin: 20px 0;">
                <div style="background: #ecf0f1; border-radius: 10px; height: 30px; overflow: hidden;">
                    <div id="barraProgresso" style="background: #3498db; height: 100%; width: 0%; transition: width 0.3s;"></div>
                </div>
                <p id="textoProgresso" style="text-align: center; margin-top: 10px; color: #2c3e50;"></p>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button onclick="fecharModalImportacao()" 
                        style="padding: 10px 20px; background: #95a5a6; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    Cancelar
                </button>
                <button onclick="importarClientes()" 
                        style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    <i class="fas fa-upload"></i> Importar
                </button>
            </div>
        </div>
    `;
    
    document.body.appendChild(modal);
}

function fecharModalImportacao() {
    const modal = document.getElementById('modalImportacao');
    
    if (modal) {
        modal.remove();
    }
}

function importarClientes() {
    const arquivo = document.getElementById('arquivoExcel').files[0];
    
    if (!arquivo) {
        alert('Selecione um arquivo Excel!');
        return;
    }
    
    const formData = new FormData();
    formData.append('arquivo', arquivo);
    
    // Mostrar progresso
    document.getElementById('progressoImportacao').style.display = 'block';
    document.getElementById('barraProgresso').style.width = '30%';
    document.getElementById('textoProgresso').textContent = 'Processando arquivo...';
    
    fetch('/api/importar-clientes-excel', {
        method: 'POST',
        body: formData
    })
    .then(r => r.json())
    .then(result => {
        document.getElementById('barraProgresso').style.width = '100%';
        
        if (result.success) {
            document.getElementById('textoProgresso').textContent = 
                `✓ Importação concluída! ${result.importados} clientes importados.`;
            document.getElementById('barraProgresso').style.background = '#27ae60';
            
            setTimeout(() => {
                fecharModalImportacao();
                carregarClientes();
                alert(`Importação concluída com sucesso!\n\n` +
                      `Clientes importados: ${result.importados}\n` +
                      (result.erros && result.erros.length > 0 ? 
                       `\nAvisos:\n${result.erros.join('\n')}` : ''));
            }, 1500);
        } else {
            document.getElementById('textoProgresso').textContent = '✗ Erro na importação';
            document.getElementById('barraProgresso').style.background = '#e74c3c';
            alert('Erro ao importar clientes:\n' + result.message);
        }
    })
    .catch(error => {
        document.getElementById('barraProgresso').style.width = '100%';
        document.getElementById('barraProgresso').style.background = '#e74c3c';
        document.getElementById('textoProgresso').textContent = '✗ Erro na importação';
        alert('Erro ao importar clientes: ' + error);
    });
}
</script>
{% endblock %}
