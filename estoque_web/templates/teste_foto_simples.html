<!DOCTYPE html>
<html>
<head>
    <title>Teste de Foto</title>
</head>
<body>
    <h1>Teste de Carregamento de Foto</h1>
    
    <h2>Teste 1: Caminho relativo</h2>
    <img src="/static/uploads/produtos/placeholder.svg" style="border: 2px solid red; max-width: 200px;">
    
    <h2>Teste 2: Via JavaScript</h2>
    <div id="container" style="border: 2px solid blue; width: 200px; height: 200px;">
        <img id="foto" style="max-width: 100%; max-height: 100%;">
    </div>
    
    <script>
        const img = document.getElementById('foto');
        img.onload = function() {
            console.log('Foto carregada!');
        };
        img.onerror = function() {
            console.log('Erro ao carregar foto!');
        };
        img.src = '/static/uploads/produtos/placeholder.svg';
    </script>
</body>
</html>
