<!DOCTYPE html>
<html>
<head>
    <title>Teste Debug Foto</title>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body>
    <h1>Teste de Carregamento de Foto</h1>
    
    <button onclick="testarFoto()">Testar Carregar Foto</button>
    
    <div style="margin-top: 20px;">
        <h3>Resultado:</h3>
        <div id="resultado"></div>
    </div>
    
    <div style="margin-top: 20px; border: 2px solid red; width: 300px; height: 300px; position: relative;">
        <img id="fotoPreview" src="/static/uploads/produtos/imagem-padrao.jpg" style="max-width: 100%; max-height: 100%; object-fit: contain; display: block;">
        <span id="semFoto" style="display: none;">Sem Foto</span>
    </div>
    
    <script>
        function testarFoto() {
            console.log('=== INICIANDO TESTE ===');
            
            fetch('/api/produtos?busca=colher')
                .then(r => r.json())
                .then(produtos => {
                    console.log('Produtos recebidos:', produtos);
                    
                    if (produtos.length > 0) {
                        const p = produtos[0];
                        console.log('Produto:', p);
                        console.log('Campo foto:', p.foto);
                        console.log('Tipo:', typeof p.foto);
                        
                        document.getElementById('resultado').innerHTML = `
                            <p><strong>Código:</strong> ${p.codigo}</p>
                            <p><strong>Descrição:</strong> ${p.descricao}</p>
                            <p><strong>Foto:</strong> ${p.foto}</p>
                            <p><strong>Tipo:</strong> ${typeof p.foto}</p>
                        `;
                        
                        // Tentar carregar a foto
                        atualizarPreviewFoto(p.foto);
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                });
        }
        
        function atualizarPreviewFoto(url) {
            const img = document.getElementById('fotoPreview');
            const semFoto = document.getElementById('semFoto');
            
            console.log('=== ATUALIZAR PREVIEW ===');
            console.log('URL recebida:', url);
            console.log('URL é null?', url === null);
            console.log('URL é undefined?', url === undefined);
            console.log('URL trim:', url ? url.trim() : 'N/A');
            
            const imagemPadrao = '/static/uploads/produtos/imagem-padrao.jpg';
            
            if (url && url.trim() !== '' && url !== 'null' && url !== 'None') {
                let fotoUrl = url;
                
                if (!url.startsWith('http') && !url.startsWith('/')) {
                    fotoUrl = '/static/uploads/produtos/' + url;
                }
                
                console.log('URL final:', fotoUrl);
                
                img.onload = function() {
                    console.log('✓ Foto carregada com sucesso!');
                    img.style.display = 'block';
                    semFoto.style.display = 'none';
                };
                
                img.onerror = function() {
                    console.log('✗ Erro ao carregar, usando padrão');
                    img.src = imagemPadrao;
                };
                
                img.src = fotoUrl;
            } else {
                console.log('Sem foto, usando padrão');
                img.src = imagemPadrao;
                img.style.display = 'block';
                semFoto.style.display = 'none';
            }
        }
    </script>
</body>
</html>
