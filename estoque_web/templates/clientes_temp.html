{% extends "base.html" %}

{% block title %}Cadastro de Funcionários{% endblock %}

{% block content %}
<div class="layout-with-list">
    <!-- Listbox Lateral -->
    <div class="sidebar-list">
        <div class="list-header">
            <input type="text" id="busca" class="list-search" placeholder="🔍 Busca Rápida...">
        </div>
        
        <div class="list-filters">
            <label style="margin-right: 10px;">
                <input type="radio" name="filtro" value="ativos" checked onchange="carregarFuncionarios()"> Ativos
            </label>
            <label style="margin-right: 10px;">
                <input type="radio" name="filtro" value="inativos" onchange="carregarFuncionarios()"> Inativos
            </label>
            <label>
                <input type="radio" name="filtro" value="todos" onchange="carregarFuncionarios()"> Todos
            </label>
        </div>
        
        <div class="list-content" id="listaFuncionarios"></div>
        
        <div class="list-footer">
            Total: <span id="totalFuncionarios">0</span>
        </div>
    </div>
    
    <!-- Área do Formulário -->
    <div class="form-area">
        <div class="toolbar">
            <button class="toolbar-btn" id="btnNovo" onclick="novoFuncionario()">
                <i class="fas fa-file"></i> NOVO
            </button>
            <button class="toolbar-btn" id="btnLimpar" onclick="novoFuncionario()">
                <i class="fas fa-broom"></i> Limpar
            </button>
            <button class="toolbar-btn btn-success" id="btnSalvar" onclick="salvarFuncionario()" style="display:none;">
                <i class="fas fa-save"></i> Salvar
            </button>
            <button class="toolbar-btn btn-success" id="btnAlterar" onclick="salvarFuncionario()" style="display:none;">
                <i class="fas fa-edit"></i> Alterar
            </button>
            <button class="toolbar-btn btn-danger" id="btnExcluir" onclick="excluirFuncionario()" style="display:none;">
                <i class="fas fa-trash"></i> Excluir
            </button>
            <button class="toolbar-btn" id="btnInativar" onclick="inativarFuncionario()" style="display:none;">
                <i class="fas fa-ban"></i> Inativar
            </button>
        </div>
        
        <form id="formFuncionario">
            <input type="hidden" id="funcionarioId">
            
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" id="nome" required>
                </div>
                <div class="form-group small">
                    <label class="form-label">ID</label>
                    <input type="text" class="form-control" id="codigo" readonly tabindex="-1" style="background-color: #ffe6e6;">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group medium">
                    <label class="form-label">Cargo *</label>
                    <input type="text" class="form-control" id="cargo" required>
                </div>
                <div class="form-group medium">
                    <label class="form-label">CPF</label>
                    <input type="text" class="form-control" id="cpf" maxlength="14">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group medium">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email">
                </div>
                <div class="form-group medium">
                    <label class="form-label">Telefone</label>
                    <input type="text" class="form-control" id="telefone">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">Endereço</label>
                    <input type="text" class="form-control" id="endereco">
                </div>
                <div class="form-group medium">
                    <label class="form-label">CEP</label>
                    <input type="text" class="form-control" id="cep" maxlength="9" onblur="buscarCEP()">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group medium">
                    <label class="form-label">Cidade</label>
                    <input type="text" class="form-control" id="cidade">
                </div>
                <div class="form-group small">
                    <label class="form-label">UF</label>
                    <input type="text" class="form-control" id="uf" maxlength="2">
                </div>
                <div class="form-group medium">
                    <label class="form-label">Data Admissão</label>
                    <input type="date" class="form-control" id="dataAdmissao" onchange="calcularTempoEmpresa()">
                </div>
                <div class="form-group medium">
                    <label class="form-label">Tempo de Empresa</label>
                    <input type="text" class="form-control" id="tempoEmpresa" readonly tabindex="-1" style="background-color: #e9ecef;">
                </div>
            </div>
        </form>
    </div>
</div>

<script>
let funcionarioSelecionado = null;

document.addEventListener('DOMContentLoaded', function() {
    carregarFuncionarios();
    document.getElementById('busca').addEventListener('input', carregarFuncionarios);
    
    // Formatação de CPF
    document.getElementById('cpf').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 11) {
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = value;
        }
    });
    
    // Formatação de Telefone
    document.getElementById('telefone').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 11) {
            if (value.length <= 10) {
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{4})(\d)/, '$1-$2');
            } else {
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{5})(\d)/, '$1-$2');
            }
            e.target.value = value;
        }
    });
    
    // Formatação de CEP
    document.getElementById('cep').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 8) {
            value = value.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        }
    });
    
    // Monitorar digitação para mostrar botão Salvar
    document.getElementById('nome').addEventListener('input', controlarBotoes);
    document.getElementById('cargo').addEventListener('input', controlarBotoes);
});

function carregarFuncionarios() {
    const busca = document.getElementById('busca').value;
    const filtro = document.querySelector('input[name="filtro"]:checked').value;
    
    fetch(`/api/funcionarios?busca=${busca}&ativo=${filtro}`)
        .then(r => r.json())
        .then(funcionarios => {
            const lista = document.getElementById('listaFuncionarios');
            lista.innerHTML = funcionarios.map(f => `
                <div class="list-item" onclick="selecionarFuncionario(${f.id})" id="item-${f.id}">
                    <span class="status-badge ${f.ativo ? 'status-ativo' : 'status-inativo'}">
                        ${f.ativo ? '✓' : '✗'}
                    </span>
                    ${f.nome}
                </div>
            `).join('');
            
            document.getElementById('totalFuncionarios').textContent = funcionarios.length;
        });
}

function selecionarFuncionario(id) {
    document.querySelectorAll('.list-item').forEach(item => item.classList.remove('selected'));
    document.getElementById(`item-${id}`).classList.add('selected');
    
    fetch(`/api/funcionarios?busca=&ativo=todos`)
        .then(r => r.json())
        .then(funcionarios => {
            const f = funcionarios.find(func => func.id === id);
            if (f) {
                funcionarioSelecionado = id;
                document.getElementById('funcionarioId').value = f.id;
                document.getElementById('codigo').value = f.id;
                document.getElementById('nome').value = f.nome;
                document.getElementById('cargo').value = f.cargo || '';
                document.getElementById('cpf').value = f.cpf || '';
                document.getElementById('email').value = f.email || '';
                document.getElementById('telefone').value = f.telefone || '';
                document.getElementById('endereco').value = f.endereco || '';
                document.getElementById('cidade').value = f.cidade || '';
                document.getElementById('uf').value = f.uf || '';
                document.getElementById('cep').value = f.cep || '';
                
                // Carregar data de admissão e calcular tempo
                if (f.data_admissao) {
                    document.getElementById('dataAdmissao').value = f.data_admissao;
                    calcularTempoEmpresa();
                }
                
                controlarBotoes();
            }
        });
}

function novoFuncionario() {
    funcionarioSelecionado = null;
    document.getElementById('formFuncionario').reset();
    document.getElementById('funcionarioId').value = '';
    document.getElementById('codigo').value = '';
    
    // Remover seleção da lista
    document.querySelectorAll('.list-item').forEach(item => {
        item.classList.remove('selected');
    });
    
    controlarBotoes();
}

function controlarBotoes() {
    const temNome = document.getElementById('nome').value.trim() !== '';
    const temCargo = document.getElementById('cargo').value.trim() !== '';
    const filtro = document.querySelector('input[name="filtro"]:checked').value;
    
    // Ocultar todos
    document.getElementById('btnNovo').style.display = 'inline-flex';
    document.getElementById('btnLimpar').style.display = 'inline-flex';
    document.getElementById('btnSalvar').style.display = 'none';
    document.getElementById('btnAlterar').style.display = 'none';
    document.getElementById('btnExcluir').style.display = 'none';
    document.getElementById('btnInativar').style.display = 'none';
    
    if (filtro === 'ativos' && funcionarioSelecionado) {
        // Funcionário ativo selecionado
        document.getElementById('btnAlterar').style.display = 'inline-flex';
        document.getElementById('btnExcluir').style.display = 'inline-flex';
        document.getElementById('btnInativar').innerHTML = '<i class="fas fa-ban"></i> Inativar';
        document.getElementById('btnInativar').style.display = 'inline-flex';
    } else if (filtro === 'inativos' && funcionarioSelecionado) {
        // Funcionário inativo selecionado
        document.getElementById('btnAlterar').style.display = 'inline-flex';
        document.getElementById('btnExcluir').style.display = 'inline-flex';
        document.getElementById('btnInativar').innerHTML = '<i class="fas fa-check"></i> Ativar';
        document.getElementById('btnInativar').style.display = 'inline-flex';
    } else if (temNome && temCargo && !funcionarioSelecionado) {
        // Novo funcionário com dados digitados
        document.getElementById('btnSalvar').style.display = 'inline-flex';
    }
}

function inativarFuncionario() {
    if (!funcionarioSelecionado) return;
    
    // Buscar o funcionário atual para saber se está ativo ou inativo
    fetch(`/api/funcionarios?busca=&ativo=todos`)
        .then(r => r.json())
        .then(funcionarios => {
            const f = funcionarios.find(func => func.id === funcionarioSelecionado);
            if (f) {
                const novoStatus = !f.ativo;
                const acao = novoStatus ? 'ativar' : 'inativar';
                
                if (confirm(`Deseja realmente ${acao} este funcionário?`)) {
                    // Atualizar apenas o status
                    const data = {
                        nome: f.nome,
                        cargo: f.cargo,
                        cpf: f.cpf,
                        email: f.email,
                        telefone: f.telefone,
                        endereco: f.endereco,
                        cidade: f.cidade,
                        uf: f.uf,
                        cep: f.cep,
                        data_admissao: f.data_admissao,
                        ativo: novoStatus
                    };
                    
                    fetch(`/api/funcionarios/${funcionarioSelecionado}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    })
                    .then(r => r.json())
                    .then(result => {
                        if (result.success) {
                            alert(`Funcionário ${acao === 'ativar' ? 'ativado' : 'inativado'} com sucesso!`);
                            carregarFuncionarios();
                            novoFuncionario();
                        }
                    });
                }
            }
        });
}

function salvarFuncionario() {
    const id = document.getElementById('funcionarioId').value;
    const cpf = document.getElementById('cpf').value;
    
    // Validar CPF duplicado
    if (cpf) {
        fetch(`/api/funcionarios?busca=&ativo=todos`)
            .then(r => r.json())
            .then(funcionarios => {
                // Verificar se já existe outro funcionário com o mesmo CPF
                const cpfExistente = funcionarios.find(f => f.cpf === cpf && f.id != id);
                if (cpfExistente) {
                    alert(`ERRO: Já existe um funcionário cadastrado com o CPF ${cpf}!\n\nFuncionário: ${cpfExistente.nome}\n\nNão é permitido CPF duplicado!`);
                    return;
                }
                
                // Se não tem duplicado, salvar
                salvarFuncionarioConfirmado(id);
            });
    } else {
        // Se não tem CPF, salvar direto
        salvarFuncionarioConfirmado(id);
    }
}

function salvarFuncionarioConfirmado(id) {
    const data = {
        nome: document.getElementById('nome').value,
        cargo: document.getElementById('cargo').value,
        cpf: document.getElementById('cpf').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        endereco: document.getElementById('endereco').value,
        cidade: document.getElementById('cidade').value,
        uf: document.getElementById('uf').value,
        cep: document.getElementById('cep').value,
        data_admissao: document.getElementById('dataAdmissao').value,
        ativo: true
    };
    
    const url = id ? `/api/funcionarios/${id}` : '/api/funcionarios';
    const method = id ? 'PUT' : 'POST';
    
    fetch(url, {
        method: method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
        if (result.success) {
            alert('Funcionário salvo com sucesso!');
            carregarFuncionarios();
            novoFuncionario();
        }
    });
}

function buscarCEP() {
    const cep = document.getElementById('cep').value.replace(/\D/g, '');
    
    if (cep.length === 8) {
        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(r => r.json())
            .then(data => {
                if (!data.erro) {
                    document.getElementById('endereco').value = data.logradouro;
                    document.getElementById('cidade').value = data.localidade;
                    document.getElementById('uf').value = data.uf;
                } else {
                    alert('CEP não encontrado!');
                }
            })
            .catch(() => {
                alert('Erro ao buscar CEP!');
            });
    }
}

function calcularTempoEmpresa() {
    const dataAdmissao = document.getElementById('dataAdmissao').value;
    
    if (!dataAdmissao) {
        document.getElementById('tempoEmpresa').value = '';
        return;
    }
    
    const admissao = new Date(dataAdmissao + 'T00:00:00');
    const hoje = new Date();
    
    let anos = hoje.getFullYear() - admissao.getFullYear();
    let meses = hoje.getMonth() - admissao.getMonth();
    let dias = hoje.getDate() - admissao.getDate();
    
    // Ajustar se os dias forem negativos
    if (dias < 0) {
        meses--;
        const ultimoDiaMesAnterior = new Date(hoje.getFullYear(), hoje.getMonth(), 0).getDate();
        dias += ultimoDiaMesAnterior;
    }
    
    // Ajustar se os meses forem negativos
    if (meses < 0) {
        anos--;
        meses += 12;
    }
    
    // Montar texto
    let tempo = '';
    if (anos > 0) {
        tempo += `${anos} ano${anos > 1 ? 's' : ''}`;
    }
    if (meses > 0) {
        if (tempo) tempo += ', ';
        tempo += `${meses} ${meses > 1 ? 'meses' : 'mês'}`;
    }
    if (dias > 0 && anos === 0) {
        if (tempo) tempo += ' e ';
        tempo += `${dias} dia${dias > 1 ? 's' : ''}`;
    }
    
    if (!tempo) {
        tempo = 'Menos de 1 dia';
    }
    
    document.getElementById('tempoEmpresa').value = tempo;
}

function excluirFuncionario() {
    if (!funcionarioSelecionado) return;
    
    if (confirm('Deseja realmente excluir este funcionário?')) {
        fetch(`/api/funcionarios/${funcionarioSelecionado}`, {method: 'DELETE'})
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    alert('Funcionário excluído!');
                    carregarFuncionarios();
                    novoFuncionario();
                }
            });
    }
}
</script>
{% endblock %}
