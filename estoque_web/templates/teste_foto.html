<!DOCTYPE html>
<html>
<head>
    <title>Teste de Foto</title>
</head>
<body>
    <h1>Teste de Carregamento de Foto</h1>
    
    <h2>Teste 1: IMG direto</h2>
    <img src="/static/uploads/produtos/teste.svg" style="width: 200px; border: 2px solid red;">
    
    <h2>Teste 2: IMG com display block</h2>
    <img src="/static/uploads/produtos/teste.svg" style="width: 200px; display: block; border: 2px solid blue;">
    
    <h2>Teste 3: IMG dentro de DIV (como no estoque)</h2>
    <div style="border: 2px solid #cbd5e0; border-radius: 4px; height: 180px; width: 180px; background-color: #f8f9fa; position: relative;">
        <img src="/static/uploads/produtos/teste.svg" alt="Sem foto" style="width: 100%; height: 100%; object-fit: contain; display: block;">
    </div>
    
    <h2>Teste 4: JavaScript dinâmico</h2>
    <div style="border: 2px solid green; height: 180px; width: 180px; position: relative;">
        <img id="testeImg" src="" style="width: 100%; height: 100%; display: none;">
        <span id="testeSemFoto">Sem foto</span>
    </div>
    
    <button onclick="carregarFoto()">Carregar Foto</button>
    
    <script>
        function carregarFoto() {
            const img = document.getElementById('testeImg');
            const semFoto = document.getElementById('testeSemFoto');
            
            console.log('Carregando foto...');
            img.src = '/static/uploads/produtos/teste.svg';
            img.style.display = 'block';
            semFoto.style.display = 'none';
            
            img.onload = function() {
                console.log('Foto carregada!', img.width, 'x', img.height);
            };
        }
    </script>
</body>
</html>
