<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Controle de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        html {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
            width: 100%;
            max-width: 350px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .login-header i {
            font-size: 45px;
            color: #667eea;
        }
        
        .login-header h2 {
            margin-top: 10px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 18px;
        }
        
        .login-header p {
            font-size: 12px;
            margin-bottom: 0;
        }
        
        .form-control {
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .form-label {
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .input-group-text {
            font-size: 13px;
        }
        
        .btn-login {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .alert-custom {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-box-seam"></i>
            <h2>Sistema de Controle de Estoque</h2>
            <p class="text-muted">Faça login para continuar</p>
        </div>
        
        <div id="alertMessage" style="display:none;" class="alert alert-danger alert-custom">
            <i class="bi bi-exclamation-triangle"></i> <span id="alertText"></span>
        </div>
        
        <form id="formLogin" autocomplete="off">
            <div class="mb-2">
                <label class="form-label">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="usuario" value="admin" required autofocus autocomplete="off">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="senha" value="admin" required autocomplete="new-password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>
        
        <div class="text-center mt-3">
            <small class="text-muted">© 2026 Sistema de Controle de Estoque</small>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        // Configurar zoom inicial em 90% para login
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.zoom = '90%';
        });
        
        // Bloquear zoom por scroll (Ctrl + scroll)
        document.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });
        
        // Bloquear zoom por atalhos de teclado (Ctrl +/-, Ctrl 0)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '0' || e.key === '=')) {
                e.preventDefault();
            }
        });
        
        $('#formLogin').on('submit', function(e) {
            e.preventDefault();
            
            const dados = {
                usuario: $('#usuario').val(),
                senha: $('#senha').val()
            };
            
            $.ajax({
                url: '/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(dados),
                success: function(response) {
                    if (response.success) {
                        window.location.href = '/';
                    } else {
                        mostrarErro(response.message);
                    }
                },
                error: function() {
                    mostrarErro('Erro ao conectar com o servidor');
                }
            });
        });
        
        function mostrarErro(mensagem) {
            $('#alertText').text(mensagem);
            $('#alertMessage').fadeIn();
            
            setTimeout(function() {
                $('#alertMessage').fadeOut();
            }, 3000);
        }
    </script>
</body>
</html>
