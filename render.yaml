services:
  - type: web
    name: sistema-estoque
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT estoque_web.app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: estoque-db
          property: connectionString

databases:
  - name: estoque-db
    databaseName: estoque
    user: estoque_user
    plan: free
    region: oregon
